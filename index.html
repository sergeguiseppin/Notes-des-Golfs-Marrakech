<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Notes Golf Marrakech</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #1e4620;
  --green-mid: #2d6a31;
  --green-light: #e8f5e9;
  --gold: #f5b731;
  --sand: #f5f0e8;
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --white: #ffffff;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--green-dark); min-height: 100vh; display: flex; flex-direction: column; }
.app { max-width: 430px; margin: 0 auto; width: 100%; min-height: 100dvh; display: flex; flex-direction: column; background: var(--sand); overflow: hidden; }

/* ══ SPLASH ══ */
#screen-splash {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--green-dark); min-height: 100dvh; padding: 40px 32px; text-align: center;
}
.splash-flag { font-size: 64px; margin-bottom: 28px; line-height: 1; }
.splash-sub { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.55); margin-bottom: 10px; }
.splash-title { font-family: 'DM Serif Display', serif; font-size: 38px; font-weight: 400; color: #fff; line-height: 1.1; margin-bottom: 8px; }
.splash-year { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: rgba(255,255,255,.5); margin-bottom: 48px; }
.splash-btn { background: #fff; color: var(--green-dark); border: none; border-radius: 50px; padding: 18px 48px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; transition: transform .1s; margin-bottom: 20px; }
.splash-btn:active { transform: scale(.96); }
.splash-hint { font-size: 12px; color: rgba(255,255,255,.35); }

/* ══ LOGIN ══ */
#screen-login { display: none; flex: 1; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.login-hdr { background: var(--green-dark); color: #fff; padding: calc(env(safe-area-inset-top,0px) + 20px) 24px 24px; text-align: center; flex-shrink: 0; }
.login-hdr .sub { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; opacity: .6; margin-bottom: 6px; }
.login-hdr h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; margin-bottom: 4px; }
.login-hdr p { font-size: 13px; opacity: .65; }
.login-body { padding: 20px 16px 32px; display: flex; flex-direction: column; gap: 8px; }
.login-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 4px; }
.login-btn { background: #fff; border: 1px solid #e0dbd0; border-radius: var(--radius-sm); padding: 13px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; width: 100%; transition: border-color .12s, background .12s, transform .08s; }
.login-btn:active { transform: scale(.98); background: var(--green-light); border-color: var(--green-mid); }
.login-btn .lav { width: 36px; height: 36px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--green-mid); flex-shrink: 0; }
.login-btn.admin-btn .lav { background: #fff8e1; color: #8a6200; }
.login-info { flex: 1; text-align: left; }
.login-info .lname { font-size: 14px; font-weight: 500; color: var(--text); }
.login-info .lsub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.admin-badge { font-size: 10px; background: #fff8e1; color: #8a6200; padding: 3px 8px; border-radius: 10px; font-weight: 500; }
.noted-badge { font-size: 10px; background: var(--green-light); color: var(--green-mid); padding: 3px 8px; border-radius: 10px; font-weight: 500; }

/* ══ APP HEADER ══ */
#screen-app { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.hdr { background: var(--green-dark); color: #fff; padding: calc(env(safe-area-inset-top,0px) + 12px) 16px 10px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
.back-btn { background: rgba(255,255,255,.15); border: none; border-radius: 20px; padding: 6px 12px; color: #fff; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; }
.back-btn:active { background: rgba(255,255,255,.25); }
.hdr-text { flex: 1; }
.hdr-text .hdr-sub { font-size: 10px; opacity: .6; letter-spacing: .08em; text-transform: uppercase; }
.hdr-text h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; }
.admin-chip { background: #fff8e1; color: #8a6200; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 10px; }

/* Tabs golfs */
.golf-tabs { display: flex; background: var(--green-dark); padding: 0 16px 12px; gap: 6px; flex-shrink: 0; overflow-x: auto; }
.golf-tab { flex-shrink: 0; background: rgba(255,255,255,.12); border: none; border-radius: 20px; padding: 7px 14px; color: rgba(255,255,255,.6); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; }
.golf-tab.active { background: #fff; color: var(--green-dark); font-weight: 500; }
.golf-tab.done { background: rgba(255,255,255,.25); color: rgba(255,255,255,.9); }

/* Main tabs */
.main-tabs { display: flex; background: #fff; border-bottom: 0.5px solid #e0dbd0; flex-shrink: 0; }
.main-tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 8px 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-muted); cursor: pointer; }
.main-tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); font-weight: 500; }

/* Views */
.views { flex: 1; overflow: hidden; }
.view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 16px; gap: 16px; -webkit-overflow-scrolling: touch; }
.view.on { display: flex; }

.section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: .07em; text-transform: uppercase; }

/* Golf card header */
.golf-card-hdr { background: var(--green-dark); border-radius: var(--radius); padding: 16px 18px; color: #fff; }
.golf-card-hdr .g-num { font-size: 10px; opacity: .6; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 3px; }
.golf-card-hdr h3 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; }
.golf-card-hdr .g-sub { font-size: 12px; opacity: .65; margin-top: 3px; }
.already-noted { background: var(--green-light); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--green-mid); text-align: center; font-weight: 500; }

/* Critère note */
.critere-card { background: #fff; border: 1px solid #e0dbd0; border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.critere-label { font-size: 14px; font-weight: 500; color: var(--text); }
.critere-label .critere-icon { font-size: 16px; margin-right: 6px; }
.note-display { font-size: 28px; font-weight: 500; color: var(--green-dark); text-align: center; min-width: 48px; }
.note-row { display: flex; align-items: center; gap: 10px; }
.note-slider { flex: 1; accent-color: var(--green-mid); }
.note-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); }

.submit-area { padding: 0 16px calc(env(safe-area-inset-bottom,0px) + 16px); flex-shrink: 0; }
.submit-btn { width: 100%; background: var(--green-dark); color: #fff; border: none; border-radius: var(--radius); padding: 16px; font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: opacity .15s, transform .08s; }
.submit-btn:disabled { opacity: .3; cursor: not-allowed; }
.submit-btn:not(:disabled):active { transform: scale(.98); }

/* Résultats */
.results-golf-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.rg-tab { background: #fff; border: 1px solid #e0dbd0; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; }
.rg-tab.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); font-weight: 500; }

.result-critere { background: #fff; border: 1px solid #e0dbd0; border-radius: var(--radius-sm); padding: 14px 16px; }
.rc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.rc-label { font-size: 13px; font-weight: 500; color: var(--text); }
.rc-avg { font-size: 22px; font-weight: 500; color: var(--green-dark); }
.rc-avg-label { font-size: 10px; color: var(--text-muted); text-align: right; }
.rc-bar-wrap { height: 8px; background: #e8e4da; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.rc-bar { height: 100%; background: var(--green-mid); border-radius: 4px; transition: width .7s ease; }
.rc-detail { font-size: 11px; color: var(--text-muted); }

.recap-card { background: #fff; border: 1px solid #e0dbd0; border-radius: var(--radius); padding: 16px; }
.recap-card h4 { font-family: 'DM Serif Display', serif; font-size: 16px; font-weight: 400; color: var(--green-dark); margin-bottom: 12px; }
.recap-row-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid #e8e4da; }
.recap-row-item:last-child { border-bottom: none; }
.recap-golf-name { font-size: 13px; font-weight: 500; color: var(--text); }
.recap-note-global { font-size: 18px; font-weight: 500; color: var(--green-dark); }
.recap-nb { font-size: 11px; color: var(--text-muted); }

.progress-info { background: #fff; border-radius: var(--radius-sm); padding: 12px 16px; border: 1px solid #e0dbd0; }
.progress-info .pi-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.progress-bar-wrap { height: 6px; background: #e8e4da; border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--green-mid); border-radius: 3px; transition: width .5s; }

.success-card { background: #fff; border-radius: var(--radius); padding: 20px; text-align: center; border: 1px solid #e0dbd0; }
.success-card .s-icon { font-size: 36px; margin-bottom: 8px; }
.success-card h3 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--green-dark); margin-bottom: 4px; }
.success-card p { font-size: 13px; color: var(--text-muted); }

.spacer { height: 8px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">

  <!-- ══ SPLASH ══ -->
  <div id="screen-splash">
    <div class="splash-flag">⛳</div>
    <div class="splash-sub">Évaluation des golfs</div>
    <div class="splash-title">Notes & Avis</div>
    <div class="splash-year">Marrakech 2025</div>
    <button class="splash-btn" onclick="openLogin()">Donner mes notes</button>
    <div class="splash-hint">3 golfs · 4 critères · 14 joueurs</div>
  </div>

  <!-- ══ LOGIN ══ -->
  <div id="screen-login">
    <div class="login-hdr">
      <div class="sub">Notes Golf · Marrakech 2025</div>
      <h1>Qui êtes-vous ?</h1>
      <p>Choisissez votre nom pour noter les golfs</p>
    </div>
    <div class="login-body">
      <div class="login-label">Les participants</div>
      <div id="login-list"></div>
    </div>
  </div>

  <!-- ══ APP ══ -->
  <div id="screen-app">
    <div class="hdr">
      <button class="back-btn" onclick="logout()">← Retour</button>
      <div class="hdr-text">
        <div class="hdr-sub">Notes Golf · Marrakech 2025</div>
        <h2 id="hdr-name">—</h2>
      </div>
      <span class="admin-chip" id="admin-chip" style="display:none">Admin</span>
    </div>
    <div class="golf-tabs" id="golf-tabs">
      <button class="golf-tab active" id="gtab-0" onclick="selectGolf(0)">Royal Palm</button>
      <button class="golf-tab" id="gtab-1" onclick="selectGolf(1)">Noria</button>
      <button class="golf-tab" id="gtab-2" onclick="selectGolf(2)">Akenza</button>
    </div>
    <div class="main-tabs">
      <button class="main-tab active" id="mtab-noter" onclick="switchMain('noter')">📝 Noter</button>
      <button class="main-tab" id="mtab-resultats" onclick="switchMain('resultats')">📊 Résultats</button>
    </div>
    <div class="views">
      <!-- Vue noter -->
      <div class="view on" id="v-noter">
        <div id="noter-content"></div>
        <div class="spacer"></div>
      </div>
      <!-- Vue résultats -->
      <div class="view" id="v-resultats">
        <div id="resultats-content"></div>
        <div class="spacer"></div>
      </div>
    </div>
    <div class="submit-area" id="submit-area" style="display:none">
      <button class="submit-btn" id="submit-btn" onclick="submitNotes()">Enregistrer mes notes</button>
    </div>
  </div>

</div>
<script>
const PLAYERS = [
  {nom:"ASLANIAN",   prenom:"Michel"},
  {nom:"COGNET",     prenom:"Christophe"},
  {nom:"CROZES",     prenom:"Bernard"},
  {nom:"DETHES",     prenom:"Lionel"},
  {nom:"GALLIX",     prenom:"François"},
  {nom:"GUISEPPIN",  prenom:"Serge"},
  {nom:"LADET",      prenom:"Guillaume"},
  {nom:"LIRON",      prenom:"Ludo"},
  {nom:"PEYTAVI",    prenom:"Thomas"},
  {nom:"PLANCHON",   prenom:"Etienne"},
  {nom:"PLANCHON N", prenom:"Nicolas"},
  {nom:"SCOLLO",     prenom:"Fabrice"},
  {nom:"SECHAUD",    prenom:"Marc"},
  {nom:"TOSI",       prenom:"Christophe"}
];
const ADMIN_KEY = "GUISEPPIN";
const TOTAL = PLAYERS.length;

const GOLFS = [
  { id: 0, nom: "Royal Palm",  jour: "Jour 1" },
  { id: 1, nom: "Noria",       jour: "Jour 2" },
  { id: 2, nom: "Akenza",      jour: "Jour 3" }
];

const CRITERES = [
  { id: "fairway",    label: "Qualité des fairways",    icon: "🌿" },
  { id: "green",      label: "Qualité des greens",      icon: "⛳" },
  { id: "parcours",   label: "Qualité générale du parcours", icon: "🏌️" },
  { id: "cadet",      label: "Accompagnement du cadet", icon: "🎒" }
];

function loadState() {
  try { return JSON.parse(localStorage.getItem('mgNotes2025') || 'null') || initState(); }
  catch(e) { return initState(); }
}
function initState() {
  // notes[golfId][playerNom][critereId] = note (1-10)
  return { notes: {} };
}
function saveState() { try { localStorage.setItem('mgNotes2025', JSON.stringify(STATE)); } catch(e){} }

let STATE = loadState();
let currentUser = null;
let isAdmin = false;
let currentGolf = 0;
let currentMain = 'noter';
let currentNotes = {}; // notes en cours de saisie pour le golf sélectionné

// ── SCREENS ──
function showScreen(id) {
  ['screen-splash','screen-login','screen-app'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = 'none';
    el.style.flex = '';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  if (id === 'screen-app') { el.style.flex = '1'; el.style.overflow = 'hidden'; }
  else if (id === 'screen-login') { el.style.flex = '1'; }
  else if (id === 'screen-splash') { el.style.flex = '1'; }
}

function openLogin() { showScreen('screen-login'); buildLoginList(); }

function buildLoginList() {
  STATE = loadState();
  const list = document.getElementById('login-list');
  list.innerHTML = '';
  PLAYERS.forEach(p => {
    const initials = (p.prenom[0]||'') + (p.nom[0]||'');
    const isAdm = p.nom === ADMIN_KEY;
    const notedCount = GOLFS.filter(g => hasNoted(p.nom, g.id)).length;
    const btn = document.createElement('button');
    btn.className = 'login-btn' + (isAdm ? ' admin-btn' : '');
    const sub = isAdm ? 'Administrateur' : notedCount === 0 ? 'Aucune note encore' : `${notedCount}/3 golf${notedCount>1?'s':''} noté${notedCount>1?'s':''}`;
    const badge = isAdm ? '<span class="admin-badge">Admin</span>' : notedCount > 0 ? `<span class="noted-badge">${notedCount}/3 ✓</span>` : '';
    btn.innerHTML = `<div class="lav">${initials}</div><div class="login-info"><div class="lname">${p.prenom} ${p.nom}</div><div class="lsub">${sub}</div></div>${badge}`;
    btn.onclick = () => login(p);
    list.appendChild(btn);
  });
}

function hasNoted(playerNom, golfId) {
  return !!(STATE.notes[golfId] && STATE.notes[golfId][playerNom]);
}

function login(p) {
  currentUser = p.nom;
  isAdmin = p.nom === ADMIN_KEY;
  currentGolf = 0;
  currentMain = 'noter';
  currentNotes = {};
  document.getElementById('hdr-name').textContent = p.prenom + ' ' + p.nom;
  document.getElementById('admin-chip').style.display = isAdmin ? 'inline-block' : 'none';
  showScreen('screen-app');
  updateGolfTabs();
  renderNoter();
  switchMain('noter');
}

function logout() { showScreen('screen-login'); buildLoginList(); }

// ── NAVIGATION ──
function selectGolf(idx) {
  currentGolf = idx;
  currentNotes = {};
  updateGolfTabs();
  if (currentMain === 'noter') renderNoter();
  else renderResultats();
}

function updateGolfTabs() {
  GOLFS.forEach((g, i) => {
    const tab = document.getElementById('gtab-'+i);
    tab.className = 'golf-tab';
    if (i === currentGolf) tab.classList.add('active');
    else if (!isAdmin && hasNoted(currentUser, i)) tab.classList.add('done');
  });
}

function switchMain(tab) {
  currentMain = tab;
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('mtab-'+tab).classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  if (tab === 'noter') {
    document.getElementById('v-noter').classList.add('on');
    renderNoter();
  } else {
    document.getElementById('v-resultats').classList.add('on');
    renderResultats();
  }
}

// ── NOTER ──
function renderNoter() {
  const g = GOLFS[currentGolf];
  const alreadyNoted = !isAdmin && hasNoted(currentUser, currentGolf);
  const nc = document.getElementById('noter-content');
  const sa = document.getElementById('submit-area');

  let html = `<div class="golf-card-hdr">
    <div class="g-num">${g.jour}</div>
    <h3>${g.nom}</h3>
    <div class="g-sub">4 critères à noter de 1 à 10</div>
  </div>`;

  if (alreadyNoted) {
    const myNotes = STATE.notes[currentGolf][currentUser];
    html += `<div class="already-noted">✓ Vous avez déjà noté ce golf</div>`;
    CRITERES.forEach(c => {
      const n = myNotes[c.id] || '—';
      html += `<div class="critere-card">
        <div class="critere-label"><span class="critere-icon">${c.icon}</span>${c.label}</div>
        <div style="text-align:center;font-size:32px;font-weight:500;color:var(--green-dark)">${n}<span style="font-size:16px;color:var(--text-muted)">/10</span></div>
      </div>`;
    });
    sa.style.display = 'none';
  } else {
    // Initialiser les notes courantes si besoin
    CRITERES.forEach(c => { if (!currentNotes[c.id]) currentNotes[c.id] = 7; });
    CRITERES.forEach(c => {
      const val = currentNotes[c.id];
      html += `<div class="critere-card">
        <div class="critere-label"><span class="critere-icon">${c.icon}</span>${c.label}</div>
        <div class="note-row">
          <input type="range" min="1" max="10" value="${val}" step="1" class="note-slider"
            oninput="updateNote('${c.id}', this.value)" />
          <div class="note-display" id="nd-${c.id}">${val}</div>
        </div>
        <div class="note-labels"><span>1 — Très mauvais</span><span>10 — Excellent</span></div>
      </div>`;
    });
    sa.style.display = '';
    document.getElementById('submit-btn').disabled = false;
  }

  nc.innerHTML = html;
}

function updateNote(critereId, val) {
  currentNotes[critereId] = parseInt(val);
  const el = document.getElementById('nd-'+critereId);
  if (el) el.textContent = val;
}

function submitNotes() {
  if (!STATE.notes[currentGolf]) STATE.notes[currentGolf] = {};
  STATE.notes[currentGolf][currentUser] = {...currentNotes};
  saveState();
  currentNotes = {};
  updateGolfTabs();
  renderNoter();
  // Aller à la prochaine golf non noté automatiquement
  const next = GOLFS.find(g => g.id !== currentGolf && !hasNoted(currentUser, g.id));
  if (next) {
    setTimeout(() => {
      currentGolf = next.id;
      updateGolfTabs();
      renderNoter();
    }, 1200);
  }
}

// ── RÉSULTATS ──
function renderResultats() {
  const el = document.getElementById('resultats-content');
  const g = GOLFS[currentGolf];
  const gNotes = STATE.notes[currentGolf] || {};
  const voters = Object.keys(gNotes);
  const nbVotants = voters.length;
  const canSee = isAdmin || nbVotants >= TOTAL;

  let html = '';

  // Progression
  const pct = Math.round(nbVotants / TOTAL * 100);
  html += `<div class="progress-info">
    <div class="pi-label">${nbVotants} / ${TOTAL} joueurs ont noté <strong>${g.nom}</strong></div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
  </div>`;

  if (!canSee) {
    html += `<div style="background:#fff;border-radius:var(--radius);padding:24px 20px;text-align:center;border:1px solid #e0dbd0;">
      <div style="font-size:32px;margin-bottom:10px">🔒</div>
      <div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--green-dark);margin-bottom:6px">Résultats verrouillés</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.6">Les notes seront visibles quand tous les <strong>${TOTAL} joueurs</strong> auront noté ce golf.</div>
    </div>`;
    el.innerHTML = html;
    return;
  }

  if (isAdmin && nbVotants < TOTAL) {
    html += `<div style="background:#fff8e1;border-radius:8px;padding:10px 14px;font-size:12px;color:#8a6200;display:flex;align-items:center;justify-content:space-between;gap:10px;">
      <span>Vue admin · ${TOTAL - nbVotants} joueur${TOTAL-nbVotants>1?'s':''} n'a pas encore noté</span>
      <button onclick="resetGolf(${currentGolf})" style="background:#c0392b;color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;">🗑 Reset</button>
    </div>`;
  }

  // Moyennes par critère
  html += `<div class="section-title">Moyennes par critère</div>`;
  CRITERES.forEach(c => {
    const vals = voters.map(p => gNotes[p][c.id]).filter(Boolean);
    const avg = vals.length > 0 ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
    const avgDisp = avg.toFixed(1);
    const w = Math.round(avg/10*100);
    const color = avg >= 8 ? '#2d6a31' : avg >= 6 ? '#8a6200' : '#c0392b';
    html += `<div class="result-critere">
      <div class="rc-header">
        <div class="rc-label">${c.icon} ${c.label}</div>
        <div>
          <div class="rc-avg" style="color:${color}">${avgDisp}</div>
          <div class="rc-avg-label">/10</div>
        </div>
      </div>
      <div class="rc-bar-wrap"><div class="rc-bar" data-w="${w}" style="width:0%;background:${color}"></div></div>
      <div class="rc-detail">${vals.length} note${vals.length>1?'s':''} · min ${vals.length?Math.min(...vals):'—'} · max ${vals.length?Math.max(...vals):'—'}</div>
    </div>`;
  });

  // Note globale de ce golf
  const allVals = voters.flatMap(p => CRITERES.map(c => gNotes[p][c.id]).filter(Boolean));
  const globalAvg = allVals.length > 0 ? (allVals.reduce((a,b)=>a+b,0)/allVals.length).toFixed(1) : '—';
  html += `<div style="background:var(--green-dark);border-radius:var(--radius);padding:16px 18px;color:#fff;display:flex;align-items:center;justify-content:space-between;">
    <div><div style="font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Note globale</div><div style="font-family:'DM Serif Display',serif;font-size:20px">${g.nom}</div></div>
    <div style="font-size:38px;font-weight:500;">${globalAvg}<span style="font-size:16px;opacity:.6">/10</span></div>
  </div>`;

  // Comparatif des 3 golfs (si au moins un a des notes)
  const comparatif = GOLFS.map(gf => {
    const gn = STATE.notes[gf.id] || {};
    const vt = Object.keys(gn);
    const av = vt.flatMap(p => CRITERES.map(c => gn[p][c.id]).filter(Boolean));
    const avg = av.length > 0 ? (av.reduce((a,b)=>a+b,0)/av.length).toFixed(1) : null;
    return { ...gf, avg, nb: vt.length };
  }).filter(x => x.avg !== null);

  if (comparatif.length > 1) {
    html += `<div class="recap-card">
      <h4>Comparatif des golfs</h4>`;
    comparatif.forEach(gf => {
      const color = parseFloat(gf.avg) >= 8 ? '#2d6a31' : parseFloat(gf.avg) >= 6 ? '#8a6200' : '#c0392b';
      html += `<div class="recap-row-item">
        <div><div class="recap-golf-name">${gf.nom}</div><div class="recap-nb">${gf.nb} note${gf.nb>1?'s':''}</div></div>
        <div class="recap-note-global" style="color:${color}">${gf.avg}<span style="font-size:12px;color:var(--text-muted)">/10</span></div>
      </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
  setTimeout(() => { el.querySelectorAll('.rc-bar').forEach(b => b.style.width = b.dataset.w+'%'); }, 100);
}

// ── ADMIN RESET ──
function resetGolf(golfId) {
  const g = GOLFS[golfId];
  if (!confirm(`Réinitialiser toutes les notes de ${g.nom} ?`)) return;
  delete STATE.notes[golfId];
  saveState();
  renderResultats();
}

// ── INIT ──
showScreen('screen-splash');
document.getElementById('screen-login').style.display = 'none';
document.getElementById('screen-app').style.display = 'none';
</script>
</body>
</html>
